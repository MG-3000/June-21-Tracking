<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Train</title>
<style>
  :root {
    --bg: #0f0f0f;
    --bg2: #1a1a1a;
    --bg3: #242424;
    --bg4: #2e2e2e;
    --line: #333;
    --line2: #444;
    --text: #f0f0f0;
    --text2: #999;
    --text3: #666;
    --purple: #7c6ff7;
    --purple-bg: #1e1b3a;
    --teal: #2dd4a0;
    --teal-bg: #0d2e24;
    --amber: #f5a623;
    --amber-bg: #2a1f0a;
    --coral: #f06a50;
    --coral-bg: #2a1208;
    --green: #4ade80;
    --red: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif; overflow: hidden; }
  
  /* ── NAV ── */
  #app { display: flex; flex-direction: column; height: 100%; }
  #nav { display: flex; background: var(--bg2); border-top: 1px solid var(--line); padding-bottom: var(--safe-bottom); flex-shrink: 0; order: 2; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 4px 8px; gap: 4px; border: none; background: none; color: var(--text3); font-size: 10px; cursor: pointer; transition: color 0.15s; }
  .nav-btn.active { color: var(--purple); }
  .nav-btn svg { width: 22px; height: 22px; }
  #screens { flex: 1; overflow: hidden; order: 1; }
  .screen { height: 100%; overflow-y: auto; overflow-x: hidden; display: none; -webkit-overflow-scrolling: touch; }
  .screen.active { display: block; }

  /* ── SHARED ── */
  .page-header { padding: 16px 16px 0; position: sticky; top: 0; background: var(--bg); z-index: 10; padding-bottom: 12px; border-bottom: 1px solid var(--line); }
  .page-title { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
  .page-sub { font-size: 13px; color: var(--text2); margin-top: 2px; }
  .section { padding: 16px 16px 0; }
  .section-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text3); margin-bottom: 10px; }
  .card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--line); overflow: hidden; margin-bottom: 12px; }
  .card-row { display: flex; align-items: center; justify-content: space-between; padding: 13px 16px; border-bottom: 1px solid var(--line); }
  .card-row:last-child { border-bottom: none; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 12px 20px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.15s, transform 0.1s; width: 100%; }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn-primary { background: var(--purple); color: #fff; }
  .btn-teal { background: var(--teal); color: #0a1f18; }
  .btn-ghost { background: var(--bg3); color: var(--text); border: 1px solid var(--line2); }
  .btn-sm { padding: 7px 14px; font-size: 13px; border-radius: var(--radius-sm); }
  .badge { font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }
  .badge-teal { background: var(--teal-bg); color: var(--teal); }
  .badge-amber { background: var(--amber-bg); color: var(--amber); }
  .badge-coral { background: var(--coral-bg); color: var(--coral); }
  input[type=text], input[type=number], textarea, select {
    background: var(--bg3); border: 1px solid var(--line2); border-radius: var(--radius-sm);
    color: var(--text); font-size: 15px; padding: 10px 12px; width: 100%;
    font-family: inherit; outline: none; -webkit-appearance: none;
  }
  input[type=text]:focus, input[type=number]:focus, textarea:focus, select:focus { border-color: var(--purple); }
  label { font-size: 13px; color: var(--text2); display: block; margin-bottom: 5px; }
  .form-group { margin-bottom: 14px; }
  .empty-state { text-align: center; padding: 48px 24px; color: var(--text3); }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: 0.3; }
  .empty-state p { font-size: 14px; line-height: 1.6; }
  .toast { position: fixed; bottom: calc(72px + var(--safe-bottom)); left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg4); color: var(--text); font-size: 14px; padding: 10px 20px; border-radius: 20px; border: 1px solid var(--line2); opacity: 0; transition: all 0.25s; z-index: 999; white-space: nowrap; pointer-events: none; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── TODAY SCREEN ── */
  .week-strip { display: flex; gap: 6px; padding: 14px 16px; overflow-x: auto; scrollbar-width: none; }
  .week-strip::-webkit-scrollbar { display: none; }
  .day-chip { flex-shrink: 0; display: flex; flex-direction: column; align-items: center; gap: 3px; padding: 8px 10px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg2); cursor: pointer; min-width: 44px; }
  .day-chip.active { border-color: var(--purple); background: var(--purple-bg); }
  .day-chip.today { border-color: var(--teal); }
  .day-chip-name { font-size: 10px; font-weight: 600; color: var(--text3); text-transform: uppercase; }
  .day-chip.active .day-chip-name { color: var(--purple); }
  .day-chip-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--line2); }
  .day-chip.logged .day-chip-dot { background: var(--teal); }
  .session-banner { margin: 0 16px 14px; padding: 14px 16px; border-radius: var(--radius); display: flex; align-items: center; justify-content: space-between; }
  .session-banner.push { background: var(--purple-bg); border: 1px solid var(--purple); }
  .session-banner.pull { background: var(--teal-bg); border: 1px solid var(--teal); }
  .session-banner.lower { background: var(--amber-bg); border: 1px solid var(--amber); }
  .session-banner.upper { background: var(--coral-bg); border: 1px solid var(--coral); }
  .session-banner.rest { background: var(--bg2); border: 1px solid var(--line); }
  .session-banner.run { background: var(--teal-bg); border: 1px solid var(--teal); }
  .banner-title { font-size: 16px; font-weight: 700; }
  .banner-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .ex-card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--line); margin-bottom: 10px; overflow: hidden; }
  .ex-header { padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
  .ex-name { font-size: 15px; font-weight: 600; }
  .ex-note-txt { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .ex-prev { font-size: 12px; color: var(--text3); }
  .ex-prev.has-data { color: var(--teal); }
  .ex-body { padding: 0 16px 14px; border-top: 1px solid var(--line); display: none; }
  .ex-body.open { display: block; }
  .sets-grid { display: grid; grid-template-columns: 40px 1fr 1fr auto; gap: 8px; align-items: center; margin-top: 12px; }
  .set-label { font-size: 12px; color: var(--text3); font-weight: 600; text-align: center; }
  .set-input { background: var(--bg3); border: 1px solid var(--line2); border-radius: var(--radius-sm); color: var(--text); font-size: 15px; padding: 9px 10px; text-align: center; outline: none; font-family: inherit; -webkit-appearance: none; }
  .set-input:focus { border-color: var(--purple); }
  .set-done-btn { width: 32px; height: 38px; border-radius: var(--radius-sm); border: 1px solid var(--line2); background: var(--bg3); color: var(--text3); font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .set-done-btn.done { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }
  .sets-col-hdr { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; text-align: center; padding-bottom: 2px; }
  .add-set-btn { margin-top: 10px; padding: 8px; border-radius: var(--radius-sm); border: 1px dashed var(--line2); background: none; color: var(--text3); font-size: 13px; cursor: pointer; width: 100%; text-align: center; }
  .add-set-btn:active { background: var(--bg3); }
  .section-divider { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); padding: 14px 0 8px; border-top: 1px solid var(--line); margin-top: 4px; }
  .finish-bar { padding: 12px 16px; padding-bottom: calc(12px + var(--safe-bottom)); }

  /* ── PROGRESS SCREEN ── */
  .pr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .pr-card { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--line); padding: 14px; }
  .pr-card-label { font-size: 11px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .pr-card-val { font-size: 22px; font-weight: 700; }
  .pr-card-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .pr-card-delta { font-size: 12px; font-weight: 600; margin-top: 4px; }
  .delta-pos { color: var(--green); }
  .delta-neg { color: var(--red); }
  .chart-wrap { background: var(--bg2); border-radius: var(--radius); border: 1px solid var(--line); padding: 16px; margin-bottom: 12px; }
  .chart-title { font-size: 13px; font-weight: 600; margin-bottom: 12px; }
  canvas { width: 100%; display: block; }
  .ex-picker { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 4px; margin-bottom: 12px; }
  .ex-picker::-webkit-scrollbar { display: none; }
  .ex-pill { flex-shrink: 0; font-size: 12px; padding: 6px 12px; border-radius: 20px; border: 1px solid var(--line2); background: var(--bg2); color: var(--text2); cursor: pointer; white-space: nowrap; }
  .ex-pill.active { background: var(--purple-bg); border-color: var(--purple); color: var(--purple); }
  .history-list-item { padding: 14px 16px; border-bottom: 1px solid var(--line); }
  .history-list-item:last-child { border-bottom: none; }
  .hli-top { display: flex; align-items: center; justify-content: space-between; }
  .hli-name { font-size: 14px; font-weight: 600; }
  .hli-date { font-size: 12px; color: var(--text3); }
  .hli-detail { font-size: 12px; color: var(--text2); margin-top: 4px; }

  /* ── PLAN SCREEN ── */
  .plan-day-row { padding: 14px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; gap: 14px; cursor: pointer; }
  .plan-day-row:last-child { border-bottom: none; }
  .plan-day-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .plan-day-info { flex: 1; }
  .plan-day-name { font-size: 15px; font-weight: 600; }
  .plan-day-desc { font-size: 12px; color: var(--text2); margin-top: 2px; }
  .plan-detail { padding: 0 16px 16px; display: none; }
  .plan-detail.open { display: block; }
  .plan-ex-row { padding: 10px 0; border-bottom: 1px solid var(--line); display: grid; grid-template-columns: 1fr 60px 60px 50px; gap: 6px; align-items: start; }
  .plan-ex-row:last-child { border-bottom: none; }
  .plan-ex-name { font-size: 13px; font-weight: 600; }
  .plan-ex-note { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .plan-ex-val { font-size: 12px; color: var(--text2); text-align: center; }
  .plan-col-hdr { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; text-align: center; padding: 8px 0 4px; border-bottom: 1px solid var(--line); display: grid; grid-template-columns: 1fr 60px 60px 50px; gap: 6px; }
  .phase-selector { display: flex; gap: 6px; padding: 12px 16px; }
  .phase-btn { flex: 1; padding: 8px 4px; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--bg2); color: var(--text2); font-size: 12px; font-weight: 600; cursor: pointer; text-align: center; }
  .phase-btn.active { background: var(--teal-bg); border-color: var(--teal); color: var(--teal); }

  /* ── BODY STATS SCREEN ── */
  .stat-history-row { display: grid; grid-template-columns: 80px 1fr 1fr 1fr; gap: 8px; padding: 10px 16px; border-bottom: 1px solid var(--line); align-items: center; }
  .stat-history-row:last-child { border-bottom: none; }
  .stat-history-row.header { background: var(--bg3); }
</style>
</head>
<body>
<div id="app">
  <div id="screens">
    <!-- TODAY -->
    <div class="screen active" id="screen-today">
      <div class="page-header">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div>
            <div class="page-title" id="today-title">Today</div>
            <div class="page-sub" id="today-date"></div>
          </div>
          <div id="phase-badge" class="badge badge-teal">Phase 1</div>
        </div>
      </div>
      <div class="week-strip" id="week-strip"></div>
      <div id="session-content" style="padding: 0 16px 16px;"></div>
    </div>

    <!-- PROGRESS -->
    <div class="screen" id="screen-progress">
      <div class="page-header">
        <div class="page-title">Progress</div>
        <div class="page-sub">Lifts, body stats & history</div>
      </div>
      <div id="progress-content" style="padding:16px 16px 32px;"></div>
    </div>

    <!-- PLAN -->
    <div class="screen" id="screen-plan">
      <div class="page-header">
        <div class="page-title">Plan</div>
        <div class="page-sub">Full program reference</div>
      </div>
      <div class="phase-selector" id="plan-phase-selector">
        <button class="phase-btn active" onclick="setPlanPhase(0)">Ph.1 Wks 1–4</button>
        <button class="phase-btn" onclick="setPlanPhase(1)">Ph.2 Wks 5–8</button>
        <button class="phase-btn" onclick="setPlanPhase(2)">Ph.3 Wk 9+</button>
      </div>
      <div id="plan-content" style="padding:0 16px 32px;"></div>
    </div>

    <!-- BODY -->
    <div class="screen" id="screen-body">
      <div class="page-header">
        <div class="page-title">More</div>
        <div class="page-sub">Body stats & extra activities</div>
      </div>
      <div class="phase-selector" id="more-tabs" style="padding:12px 16px 0">
        <button class="phase-btn active" id="more-tab-body" onclick="switchMoreTab('body')">Body stats</button>
        <button class="phase-btn" id="more-tab-activity" onclick="switchMoreTab('activity')">Activities</button>
      </div>
      <div id="body-content" style="padding:16px 16px 32px;"></div>
    </div>
  </div>

  <div id="nav">
    <button class="nav-btn active" onclick="showScreen('today')" id="nav-today">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Today
    </button>
    <button class="nav-btn" onclick="showScreen('progress')" id="nav-progress">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Progress
    </button>
    <button class="nav-btn" onclick="showScreen('plan')" id="nav-plan">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
      Plan
    </button>
    <button class="nav-btn" onclick="showScreen('body')" id="nav-body">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
      More
    </button>
  </div>
</div>
<div class="toast" id="toast"></div>

// ── STORAGE ───────────────────────────────────────────────────────────────────
const DB = {
  get(k) { try { return JSON.parse(localStorage.getItem(k)); } catch(e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); return true; } catch(e) { return false; } },
  keys(prefix) { try { return Object.keys(localStorage).filter(k => k.startsWith(prefix)); } catch(e) { return []; } },
  del(k) { try { localStorage.removeItem(k); } catch(e) {} }
};

// ── HELPERS ───────────────────────────────────────────────────────────────────
function today() {
  const d = new Date();
  return d.toISOString().split('T')[0];
}
function dayOfWeek() {
  return ['sun','mon','tue','wed','thu','fri','sat'][new Date().getDay()];
}
function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}
function sessionKey(dateStr, dayKey) { return `session_${dateStr}_${dayKey}`; }
function bodyKey(dateStr) { return `body_${dateStr}`; }

function showScreen(name) {
  currentScreen = name;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');

  if (name === 'progress') renderProgress();
  if (name === 'plan') renderPlan();
  if (name === 'body') { renderBody(); }
}

function toggleEx(key) {
  const b = document.getElementById('exb_' + key);
  b.classList.toggle('open');
}

function updateSet(dayKey, exKey, setIdx, field, val) {
  if (!currentSessionData[exKey]) {
    const [si, ei] = exKey.split('_').map(Number);
    const ex = getExFromKey(dayKey, si, ei);
    currentSessionData[exKey] = { sets: Array.from({length: ex.sets}, () => ({w:'',r:'',done:false})) };
  }
  while (currentSessionData[exKey].sets.length <= setIdx) {
    currentSessionData[exKey].sets.push({w:'',r:'',done:false});
  }
  currentSessionData[exKey].sets[setIdx][field] = val;
  autoSaveSession(dayKey);
}

function toggleSetDone(dayKey, exKey, setIdx, btn) {
  if (!currentSessionData[exKey]) {
    const [si, ei] = exKey.split('_').map(Number);
    const ex = getExFromKey(dayKey, si, ei);
    currentSessionData[exKey] = { sets: Array.from({length: ex.sets}, () => ({w:'',r:'',done:false})) };
  }
  const set = currentSessionData[exKey].sets[setIdx];
  set.done = !set.done;
  btn.classList.toggle('done', set.done);
  btn.textContent = set.done ? '✓' : '○';
  autoSaveSession(dayKey);
}

function addSet(dayKey, exKey, si, ei) {
  if (!currentSessionData[exKey]) {
    const ex = getExFromKey(dayKey, parseInt(si), parseInt(ei));
    currentSessionData[exKey] = { sets: Array.from({length: ex.sets}, () => ({w:'',r:'',done:false})) };
  }
  const newIdx = currentSessionData[exKey].sets.length;
  currentSessionData[exKey].sets.push({w:'',r:'',done:false});
  const grid = document.querySelector(`#exb_${exKey} .sets-grid`);
  const newRow = document.createElement('div'); newRow.innerHTML = `<div></div>`;
  // Re-render the exercise
  const setIdx = newIdx;
  const rowsHTML = `
    <div class="set-label" style="color:var(--text3)">S${setIdx+1}</div>
    <input class="set-input" type="number" placeholder="lbs"
      onchange="updateSet('${dayKey}','${exKey}',${setIdx},'w',this.value)" id="sw_${exKey}_${setIdx}">
    <input class="set-input" type="number" placeholder="reps"
      onchange="updateSet('${dayKey}','${exKey}',${setIdx},'r',this.value)" id="sr_${exKey}_${setIdx}">
    <div class="set-done-btn" onclick="toggleSetDone('${dayKey}','${exKey}',${setIdx},this)">○</div>`;
  grid.insertAdjacentHTML('beforeend', rowsHTML);
  autoSaveSession(dayKey);
}

function getExFromKey(dayKey, si, ei) { return PLAN[dayKey].sections[si].exercises[ei]; }

function autoSaveSession(dayKey) {
  const key = sessionKey(today(), dayKey);
  const existing = DB.get(key) || {};
  DB.set(key, { ...existing, exercises: currentSessionData, dayKey, date: today() });
}

function updateSessionNotes(dayKey, val) {
  const key = sessionKey(today(), dayKey);
  const existing = DB.get(key) || {};
  DB.set(key, { ...existing, notes: val, exercises: currentSessionData, dayKey, date: today() });
}

function saveDaySession(dayKey) {
  const key = sessionKey(today(), dayKey);
  const existing = DB.get(key) || {};
  const notes = document.getElementById('session-notes')?.value || existing.notes || '';
  DB.set(key, { ...existing, exercises: currentSessionData, notes, dayKey, date: today(), saved: true });
  updatePRs(dayKey);
  showToast('Session saved');
}

function clearDaySession(dayKey) {
  currentSessionData = {};
  DB.del(sessionKey(today(), dayKey));
  renderToday(dayKey);
}

function loadExistingSession(dayKey) {
  const saved = DB.get(sessionKey(today(), dayKey));
  if (!saved) return;
  currentSessionData = saved.exercises || {};
}

function saveRun(dayKey) {
  const dist = document.getElementById('run-dist')?.value;
  const dur = document.getElementById('run-dur')?.value;
  const hr = document.getElementById('run-hr')?.value;
  const effort = document.getElementById('run-effort')?.value;
  const notes = document.getElementById('run-notes')?.value;
  if (!dist && !dur) { showToast('Add distance or duration'); return; }
  const key = sessionKey(today(), dayKey);
  DB.set(key, { dayKey, date: today(), run: { dist, dur, hr, effort, notes }, saved: true });
  showToast('Run saved');
}

function shareSession(dayKey) {
  // Pull latest notes from the field if present
  const liveNotes = document.getElementById('session-notes')?.value;
  if (liveNotes !== undefined) updateSessionNotes(dayKey, liveNotes);

  const day = PLAN[dayKey];
  const phaseLabel = ['Phase 1','Phase 2','Phase 3'][currentPhase];
  const lines = [`${day.name} — ${formatDate(today())} (${phaseLabel})`, ''];

  let anyLogged = false;
  day.sections.forEach((sec, si) => {
    const secLines = [];
    sec.exercises.forEach((ex, ei) => {
      if (currentPhase === 0 && ex.p1drop) return;
      const exKey = `${si}_${ei}`;
      const data = currentSessionData[exKey];
      if (!data || !data.sets) return;
      const setStrs = data.sets
        .filter(s => s.w || s.r)
        .map(s => `${s.w||'?'}${s.r?'×'+s.r:''}`);
      if (setStrs.length) {
        secLines.push(`  ${ex.n}: ${setStrs.join(', ')}`);
        anyLogged = true;
      }
    });
    if (secLines.length) {
      lines.push(`${sec.name}:`);
      lines.push(...secLines);
      lines.push('');
    }
  });

  const notes = document.getElementById('session-notes')?.value;
  if (notes) { lines.push('Notes: ' + notes); }

  if (!anyLogged && !notes) {
    showToast('Log some sets first');
    return;
  }

  const text = lines.join('\n').trim();
  copyToClipboard(text);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text)
      .then(() => showToast('Copied — paste into chat'))
      .catch(() => fallbackCopy(text));
  } else {
    fallbackCopy(text);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement('textarea');
  ta.value = text;
  ta.style.position = 'fixed';
  ta.style.opacity = '0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand('copy');
    showToast('Copied — paste into chat');
  } catch (e) {
    showToast('Copy failed — long-press to select');
  }
  document.body.removeChild(ta);
}

function shareRun(dayKey) {
  const dist = document.getElementById('run-dist')?.value;
  const dur = document.getElementById('run-dur')?.value;
  const hr = document.getElementById('run-hr')?.value;
  const effort = document.getElementById('run-effort')?.value;
  const notes = document.getElementById('run-notes')?.value;
  if (!dist && !dur) { showToast('Log the run first'); return; }
  const phaseLabel = ['Phase 1','Phase 2','Phase 3'][currentPhase];
  const lines = [`Run — ${formatDate(today())} (${phaseLabel})`, ''];
  if (dist) lines.push(`Distance: ${dist} mi`);
  if (dur) lines.push(`Duration: ${dur} min`);
  if (hr) lines.push(`Avg HR: ${hr} bpm`);
  if (effort) lines.push(`Effort: ${effort}/10`);
  if (notes) lines.push(`Notes: ${notes}`);
  copyToClipboard(lines.join('\n').trim());
}

// ── PR TRACKING ───────────────────────────────────────────────────────────────
function getPR(exName) {
  const prs = DB.get('prs') || {};
  return prs[exName] || null;
}

function updatePRs(dayKey) {
  const prs = DB.get('prs') || {};
  const day = PLAN[dayKey];
  if (!day.sections) return;
  day.sections.forEach((sec, si) => {
    sec.exercises.forEach((ex, ei) => {
      const exKey = `${si}_${ei}`;
      const sets = currentSessionData[exKey]?.sets || [];
      sets.forEach(s => {
        const w = parseFloat(s.w), r = parseInt(s.r);
        if (!isNaN(w) && !isNaN(r) && w > 0 && r > 0) {
          const cur = prs[ex.n];
          if (!cur || w > cur.weight || (w === cur.weight && r > cur.reps)) {
            prs[ex.n] = { weight: w, reps: r, date: today() };
          }
        }
      });
    });
  });
  DB.set('prs', prs);
}

// ── PROGRESS ──────────────────────────────────────────────────────────────────
function renderProgress() {
  const el = document.getElementById('progress-content');
  const bodyHistory = DB.keys('body_').map(k => DB.get(k)).filter(Boolean).sort((a,b) => a.date > b.date ? -1 : 1);
  const sessionHistory = DB.keys('session_').map(k => DB.get(k)).filter(Boolean).sort((a,b) => a.date > b.date ? -1 : 1);
  const prs = DB.get('prs') || {};

  const latest = bodyHistory[0];
  const prev = bodyHistory[1];

  const wDelta = latest && prev && latest.weight && prev.weight ?
    (parseFloat(latest.weight) - parseFloat(prev.weight)).toFixed(1) : null;
  const bfDelta = latest && prev && latest.bf && prev.bf ?

function drawLineChart(canvasId, labels, data) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.offsetWidth, h = 120;
  canvas.width = w * dpr; canvas.height = h * dpr;
  const ctx = canvas.getContext('2d');
  ctx.scale(dpr, dpr);
  const pad = { t:10, r:10, b:24, l:44 };
  const cw = w - pad.l - pad.r, ch = h - pad.t - pad.b;
  const min = Math.min(...data) - 2, max = Math.max(...data) + 2;
  const xStep = cw / (data.length - 1);
  const yScale = ch / (max - min);
  const toX = i => pad.l + i * xStep;
  const toY = v => pad.t + (max - v) * yScale;

  // Grid
  ctx.strokeStyle = '#333'; ctx.lineWidth = 0.5;
  for (let i=0;i<3;i++) {
    const y = pad.t + (ch/2)*i;
    ctx.beginPath(); ctx.moveTo(pad.l, y); ctx.lineTo(w-pad.r, y); ctx.stroke();
  }

  // Line
  ctx.beginPath();
  ctx.moveTo(toX(0), toY(data[0]));
  data.forEach((v,i) => { if(i>0) ctx.lineTo(toX(i), toY(v)); });
  ctx.strokeStyle = '#7c6ff7'; ctx.lineWidth = 2; ctx.stroke();

  // Dots
  data.forEach((v,i) => {
    ctx.beginPath(); ctx.arc(toX(i), toY(v), 4, 0, Math.PI*2);
    ctx.fillStyle = '#7c6ff7'; ctx.fill();
  });

  // Y labels
  ctx.fillStyle = '#666'; ctx.font = `10px -apple-system, sans-serif`; ctx.textAlign = 'right';
  [min+2, Math.round((min+max)/2), max-2].forEach(v => {
    ctx.fillText(Math.round(v), pad.l-4, toY(v)+4);
  });

  // X labels
  ctx.textAlign = 'center';
  const step = Math.max(1, Math.floor(data.length/4));
  labels.forEach((l,i) => { if(i%step===0) ctx.fillText(l, toX(i), h-6); });
}

function exportData() {
  try {
    const data = {};
    const prefixes = ['session_','body_','activity_','prs','currentPhase'];
    Object.keys(localStorage).forEach(k => {
      if (prefixes.some(p => k === p || k.startsWith(p))) {
        data[k] = localStorage.getItem(k);
      }
    });
    const payload = { app: 'workout-tracker', exported: new Date().toISOString(), data };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `workout-backup-${today()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Backup exported');
  } catch (e) {
    showToast('Export failed');
  }
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const payload = JSON.parse(e.target.result);
      if (!payload.data || payload.app !== 'workout-tracker') {
        showToast('Not a valid backup file');
        return;
      }
      let count = 0;
      Object.keys(payload.data).forEach(k => {
        localStorage.setItem(k, payload.data[k]);
        count++;
      });
      currentPhase = parseInt(DB.get('currentPhase')) || 0;
      showToast(`Restored ${count} items`);
      renderBody();
    } catch (err) {
      showToast('Could not read backup file');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

}
